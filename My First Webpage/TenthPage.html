<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mufutumari Shop - Track Order</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <script defer src="https://use.fontawesome.com/releases/v5.15.4/js/all.js" integrity="sha384-rOA1PnstxnOBLzCLMcre8ybwbTmemjzdNlILg8O7z1lUkLXozs4DHonlDtnE7fpc" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="mystyle.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 fixed-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="FirstPage.html">
        <img src="img/logo1.png" alt="Mufutumari Shop logo" height="50" width="50">
        <span class="ms-2 fw-bold">Mufutumari Shop</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="FirstPage.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="SecondPage.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="ThirdPage.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="FourthPage.html">Blog</a></li>
          <li class="nav-item"><a class="nav-link" href="FifthPage.html">Contact Us</a></li>
          <li class="nav-item"><a class="nav-link" href="SixthPage.html">Services</a></li>
          <li class="nav-item"><a class="nav-link" href="SeventhPage.html">FAQ</a></li>
          <li class="nav-item"><a class="nav-link" href="EighthPage.html">Checkout</a></li>
          <li class="nav-item"><a class="nav-link" href="NinthPage.html">Orders</a></li>
          <li class="nav-item"><a class="nav-link active" href="TenthPage.html">Track</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="order-history-section py-5 mt-5">
    <div class="container pt-4">
      <div class="text-center mb-4">
        <h2>Track Your Order</h2>
        <hr class="mx-auto">
        <p>Enter your order ID (example: ORD-1743412345678) to view live status.</p>
      </div>

      <div class="checkout-card p-4 mx-auto" style="max-width: 760px;">
        <form id="trackForm" class="row g-2" novalidate>
          <div class="col-md-9">
            <label for="orderIdInput" class="form-label">Order ID</label>
            <input type="text" id="orderIdInput" class="form-control" placeholder="ORD-..." required>
          </div>
          <div class="col-md-3 d-flex align-items-end">
            <button type="submit" class="shop-btn w-100">Track</button>
          </div>
        </form>
        <p id="trackStatus" class="mt-3 mb-0"></p>
      </div>

      <div id="trackResult" class="mt-4"></div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script>
    const savedTheme = localStorage.getItem('mufu-theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-theme');
    }

    const trackForm = document.getElementById('trackForm');
    const orderIdInput = document.getElementById('orderIdInput');
    const trackStatus = document.getElementById('trackStatus');
    const trackResult = document.getElementById('trackResult');

    const getStatusByAge = (dateString) => {
      const ms = Date.now() - new Date(dateString).getTime();
      const hours = ms / (1000 * 60 * 60);
      if (hours < 1) return 'Order received';
      if (hours < 24) return 'Preparing package';
      if (hours < 72) return 'Out for delivery';
      return 'Delivered';
    };

    trackForm.addEventListener('submit', function (event) {
      event.preventDefault();

      if (!trackForm.checkValidity()) {
        trackStatus.textContent = 'Please enter a valid order ID.';
        trackStatus.style.color = '#dc3545';
        return;
      }

      const orderId = orderIdInput.value.trim();
      const orders = JSON.parse(localStorage.getItem('mufu-orders') || '[]');
      const order = orders.find((entry) => entry.id === orderId);

      if (!order) {
        trackStatus.textContent = `No order found for ID ${orderId}.`;
        trackStatus.style.color = '#dc3545';
        trackResult.innerHTML = '';
        return;
      }

      const status = getStatusByAge(order.date);
      trackStatus.textContent = `Order ${order.id} found.`;
      trackStatus.style.color = '#198754';

      trackResult.innerHTML = `
        <div class="checkout-card p-4 mx-auto" style="max-width: 760px;">
          <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
            <h5 class="mb-0">${order.id}</h5>
            <small class="text-muted">${order.date}</small>
          </div>
          <p class="mb-2"><strong>Status:</strong> <span class="text-success">${status}</span></p>
          <p class="mb-2"><strong>Customer:</strong> ${order.customer.name} (${order.customer.city})</p>
          <p class="mb-2"><strong>Items:</strong> ${order.items.map((item) => `${item.name} x${item.qty}`).join(', ')}</p>
          <p class="mb-0 fs-5"><strong>Total:</strong> $${order.totals.total.toFixed(2)}</p>
        </div>
      `;
    });
  </script>
</body>
</html>
