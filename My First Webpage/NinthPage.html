<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mufutumari Shop - Order History</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <script defer src="https://use.fontawesome.com/releases/v5.15.4/js/all.js" integrity="sha384-rOA1PnstxnOBLzCLMcre8ybwbTmemjzdNlILg8O7z1lUkLXozs4DHonlDtnE7fpc" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="mystyle.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 fixed-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="FirstPage.html">
        <img src="img/logo1.png" alt="Mufutumari Shop logo" height="50" width="50">
        <span class="ms-2 fw-bold">Mufutumari Shop</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="FirstPage.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="SecondPage.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="ThirdPage.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="FourthPage.html">Blog</a></li>
          <li class="nav-item"><a class="nav-link" href="FifthPage.html">Contact Us</a></li>
          <li class="nav-item"><a class="nav-link" href="SixthPage.html">Services</a></li>
          <li class="nav-item"><a class="nav-link" href="SeventhPage.html">FAQ</a></li>
          <li class="nav-item"><a class="nav-link" href="EighthPage.html">Checkout</a></li>
          <li class="nav-item"><a class="nav-link active" href="NinthPage.html">Orders</a></li>
          <li class="nav-item"><a class="nav-link" href="TenthPage.html">Track</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="order-history-section py-5 mt-5">
    <div class="container pt-4">
      <div class="text-center mb-4">
        <h2>Order History</h2>
        <hr class="mx-auto">
        <p>Track your recent purchases and totals in one place.</p>
      </div>

      <div class="d-flex justify-content-end mb-3">
        <button id="clearOrdersBtn" type="button" class="btn btn-outline-danger btn-sm">Clear History</button>
      </div>

      <div id="ordersList" class="row g-3"></div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script>
    const savedTheme = localStorage.getItem('mufu-theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-theme');
    }

    const ordersList = document.getElementById('ordersList');
    const clearOrdersBtn = document.getElementById('clearOrdersBtn');

    const renderOrders = () => {
      const orders = JSON.parse(localStorage.getItem('mufu-orders') || '[]');

      if (orders.length === 0) {
        ordersList.innerHTML = `
          <div class="col-12">
            <div class="checkout-card p-4 text-center">
              <p class="mb-0">No orders yet. <a href="SecondPage.html">Start shopping now</a>.</p>
            </div>
          </div>
        `;
        return;
      }

      ordersList.innerHTML = orders.map((order) => `
        <div class="col-12">
          <div class="checkout-card p-4 order-card">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h5 class="mb-0">${order.id}</h5>
              <small class="text-muted">${order.date}</small>
            </div>
            <p class="mb-2"><strong>Customer:</strong> ${order.customer.name} (${order.customer.city})</p>
            <p class="mb-2"><strong>Email:</strong> ${order.customer.email}</p>
            <p class="mb-2"><strong>Coupon:</strong> ${order.coupon || 'None'}</p>
            <div class="small mb-3">
              ${order.items.map((item) => `<div>${item.name} x${item.qty}</div>`).join('')}
            </div>
            <p class="mb-1"><strong>Subtotal:</strong> $${order.totals.subtotal.toFixed(2)}</p>
            <p class="mb-1"><strong>Discount:</strong> -$${order.totals.discount.toFixed(2)}</p>
            <p class="mb-1"><strong>Shipping:</strong> $${order.totals.shipping.toFixed(2)}</p>
            <p class="mb-0 fs-5"><strong>Total:</strong> $${order.totals.total.toFixed(2)}</p>
          </div>
        </div>
      `).join('');
    };

    clearOrdersBtn.addEventListener('click', function () {
      localStorage.removeItem('mufu-orders');
      renderOrders();
    });

    renderOrders();
  </script>
</body>
</html>
