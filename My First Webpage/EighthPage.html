<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mufutumari Shop - Checkout</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script defer src="https://use.fontawesome.com/releases/v5.15.4/js/all.js" integrity="sha384-rOA1PnstxnOBLzCLMcre8ybwbTmemjzdNlILg8O7z1lUkLXozs4DHonlDtnE7fpc" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="mystyle.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 fixed-top">
        <div class="container">
          <a class="navbar-brand d-flex align-items-center" href="FirstPage.html">
            <img src="img/logo1.png" alt="Mufutumari Shop logo" height="50" width="50">
            <span class="ms-2 fw-bold">Mufutumari Shop</span>
          </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
              <li class="nav-item"><a class="nav-link" href="FirstPage.html">Home</a></li>
              <li class="nav-item"><a class="nav-link" href="SecondPage.html">Shop</a></li>
              <li class="nav-item"><a class="nav-link" href="ThirdPage.html">About</a></li>
              <li class="nav-item"><a class="nav-link" href="FourthPage.html">Blog</a></li>
              <li class="nav-item"><a class="nav-link" href="FifthPage.html">Contact Us</a></li>
              <li class="nav-item"><a class="nav-link" href="SixthPage.html">Services</a></li>
              <li class="nav-item"><a class="nav-link" href="SeventhPage.html">FAQ</a></li>
              <li class="nav-item"><a class="nav-link active" href="EighthPage.html">Checkout</a></li>
              <li class="nav-item"><a class="nav-link" href="NinthPage.html">Orders</a></li>
            </ul>
          </div>
        </div>
    </nav>

    <section class="checkout-section py-5 mt-5">
        <div class="container pt-4">
            <div class="text-center mb-4">
                <h2>Checkout</h2>
                <hr class="mx-auto">
                <p>Review your order details before placing it.</p>
            </div>

            <div class="row g-4">
                <div class="col-lg-7">
                    <div class="checkout-card p-4">
                        <h5 class="mb-3">Shipping Information</h5>
                        <form id="checkoutForm" novalidate>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="fullName" class="form-label">Full Name</label>
                                    <input type="text" id="fullName" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" id="email" class="form-control" required>
                                </div>
                                <div class="col-12">
                                    <label for="address" class="form-label">Address</label>
                                    <input type="text" id="address" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="city" class="form-label">City</label>
                                    <input type="text" id="city" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="phone" class="form-label">Phone</label>
                                    <input type="tel" id="phone" class="form-control" required>
                                </div>
                            </div>
                            <button type="submit" class="shop-btn mt-4">Place Order</button>
                            <p id="checkoutStatus" class="mt-3 mb-0"></p>
                        </form>
                    </div>
                </div>

                <div class="col-lg-5">
                    <div class="checkout-card p-4">
                        <h5 class="mb-3">Order Summary</h5>
                        <div id="checkoutItems"></div>
                      <div class="coupon-box mt-3">
                        <label for="couponCode" class="form-label">Promo Code</label>
                        <div class="d-flex gap-2">
                          <input type="text" id="couponCode" class="form-control" placeholder="Try MUFU10">
                          <button id="applyCouponBtn" type="button" class="btn btn-dark">Apply</button>
                        </div>
                        <p id="couponStatus" class="small mt-2 mb-0"></p>
                      </div>
                        <hr>
                        <p class="d-flex justify-content-between mb-1"><span>Subtotal</span><strong id="checkoutSubtotal">$0.00</strong></p>
                      <p class="d-flex justify-content-between mb-1"><span>Discount</span><span id="checkoutDiscount">-$0.00</span></p>
                        <p class="d-flex justify-content-between mb-1"><span>Shipping</span><span id="checkoutShipping">$5.00</span></p>
                        <p class="d-flex justify-content-between mb-0 fs-5"><span>Total</span><strong id="checkoutTotal">$0.00</strong></p>
                      <a href="NinthPage.html" class="btn btn-outline-dark w-100 mt-3">View Order History</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
      const checkoutItems = document.getElementById('checkoutItems');
      const checkoutSubtotal = document.getElementById('checkoutSubtotal');
      const checkoutDiscount = document.getElementById('checkoutDiscount');
      const checkoutTotal = document.getElementById('checkoutTotal');
      const checkoutForm = document.getElementById('checkoutForm');
      const checkoutStatus = document.getElementById('checkoutStatus');
      const couponCode = document.getElementById('couponCode');
      const applyCouponBtn = document.getElementById('applyCouponBtn');
      const couponStatus = document.getElementById('couponStatus');

      const savedTheme = localStorage.getItem('mufu-theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-theme');
      }

      const cart = JSON.parse(localStorage.getItem('mufu-cart') || '[]');
      const validCoupons = {
        MUFU10: 0.10,
        STYLE15: 0.15,
        VIP20: 0.20
      };
      let currentDiscountRate = 0;
      let currentCoupon = '';

      const getSubtotal = () => cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

      const updateTotals = () => {
        const subtotal = getSubtotal();
        const shipping = subtotal > 0 ? 5 : 0;
        const discountValue = subtotal * currentDiscountRate;
        const total = Math.max(subtotal - discountValue + shipping, 0);

        checkoutSubtotal.textContent = `$${subtotal.toFixed(2)}`;
        checkoutDiscount.textContent = `-$${discountValue.toFixed(2)}`;
        checkoutTotal.textContent = `$${total.toFixed(2)}`;

        return { subtotal, shipping, discountValue, total };
      };

      const renderSummary = () => {
        if (cart.length === 0) {
          checkoutItems.innerHTML = '<p class="text-muted mb-0">Your cart is empty. <a href="SecondPage.html">Go back to shop</a>.</p>';
          checkoutDiscount.textContent = '-$0.00';
          checkoutSubtotal.textContent = '$0.00';
          checkoutTotal.textContent = '$0.00';
          return;
        }

        checkoutItems.innerHTML = cart.map((item) => `
          <div class="d-flex justify-content-between align-items-center mb-2">
            <span>${item.name} <small class="text-muted">x${item.qty}</small></span>
            <span>$${(item.price * item.qty).toFixed(2)}</span>
          </div>
        `).join('');

        updateTotals();
      };

      applyCouponBtn.addEventListener('click', function () {
        const code = couponCode.value.trim().toUpperCase();

        if (!code) {
          couponStatus.textContent = 'Enter a promo code first.';
          couponStatus.style.color = '#dc3545';
          return;
        }

        if (!validCoupons[code]) {
          currentDiscountRate = 0;
          currentCoupon = '';
          couponStatus.textContent = 'Invalid code. Try MUFU10, STYLE15, or VIP20.';
          couponStatus.style.color = '#dc3545';
          updateTotals();
          return;
        }

        currentDiscountRate = validCoupons[code];
        currentCoupon = code;
        couponStatus.textContent = `Coupon ${code} applied successfully!`;
        couponStatus.style.color = '#198754';
        updateTotals();
      });

      checkoutForm.addEventListener('submit', function (event) {
        event.preventDefault();

        if (!checkoutForm.checkValidity()) {
          checkoutStatus.textContent = 'Please fill in all required fields correctly.';
          checkoutStatus.style.color = '#dc3545';
          return;
        }

        if (cart.length === 0) {
          checkoutStatus.textContent = 'Your cart is empty. Add products before checkout.';
          checkoutStatus.style.color = '#dc3545';
          return;
        }

        const { subtotal, shipping, discountValue, total } = updateTotals();

        const orders = JSON.parse(localStorage.getItem('mufu-orders') || '[]');
        orders.unshift({
          id: `ORD-${Date.now()}`,
          date: new Date().toLocaleString(),
          customer: {
            name: document.getElementById('fullName').value.trim(),
            email: document.getElementById('email').value.trim(),
            city: document.getElementById('city').value.trim()
          },
          coupon: currentCoupon || null,
          totals: {
            subtotal,
            shipping,
            discount: discountValue,
            total
          },
          items: cart
        });
        localStorage.setItem('mufu-orders', JSON.stringify(orders));

        checkoutStatus.textContent = 'Order placed successfully! Thank you for shopping with Mufutumari Shop.';
        checkoutStatus.style.color = '#198754';
        localStorage.removeItem('mufu-cart');
        checkoutForm.reset();
        setTimeout(() => {
          window.location.href = 'NinthPage.html';
        }, 1300);
      });

      renderSummary();
    </script>
</body>
</html>
